<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Buying Dashboard | Q3 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="p-6 flex items-center space-x-3 border-b border-slate-800">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="target" class="w-5 h-5"></i></div>
            <span class="font-bold text-xl">MediaPlanner</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4 text-slate-400">
            <div class="flex items-center space-x-3 px-4 py-3 bg-blue-600 text-white rounded-lg">
                <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
            </div>
            <div class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-lg cursor-pointer transition">
                <i data-lucide="calendar-days"></i><span>Planning</span>
            </div>
            <div class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white rounded-lg cursor-pointer transition">
                <i data-lucide="shopping-cart"></i><span>Achat Média</span>
            </div>
        </nav>
        <div class="p-4 border-t border-slate-800 text-sm text-slate-500">v1.2.0 - 2026</div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-xl font-bold text-slate-800">Vue d'ensemble du Q3</h1>
            <div class="flex items-center space-x-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-slate-700">Sophie Lahlou</p>
                    <p class="text-xs text-slate-500 text-emerald-600 font-medium">Media Buyer Senior</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center font-bold text-blue-700">SL</div>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="wallet"></i></div>
                    <div><p class="text-xs text-slate-500 uppercase font-bold">Budget Planifié</p><p class="text-2xl font-black">485 000 €</p></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
                    <div class="p-3 bg-purple-50 text-purple-600 rounded-lg"><i data-lucide="trending-up"></i></div>
                    <div><p class="text-xs text-slate-500 uppercase font-bold">Dépenses Réelles</p><p class="text-2xl font-black">206 500 €</p></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
                    <div class="p-3 bg-green-50 text-green-600 rounded-lg"><i data-lucide="users"></i></div>
                    <div><p class="text-xs text-slate-500 uppercase font-bold">Reach Total</p><p class="text-2xl font-black">4.2M</p></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-100 flex items-center space-x-4">
                    <div class="p-3 bg-orange-50 text-orange-600 rounded-lg"><i data-lucide="bar-chart-3"></i></div>
                    <div><p class="text-xs text-slate-500 uppercase font-bold">ROI Moyen</p><p class="text-2xl font-black text-green-600">+18%</p></div>
                </div>
            </div>
